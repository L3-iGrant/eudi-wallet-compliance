server {
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /pagefind/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Next was built with trailingSlash: true so on-site links always
    # use /foo/. For requests that arrive as /foo, fall through the
    # try_files chain to /foo/index.html.
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}

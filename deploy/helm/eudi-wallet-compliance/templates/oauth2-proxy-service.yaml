{{- if .Values.oauth2Proxy.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eudiwc.oauth2ProxyName" . }}
  labels:
    {{- include "eudiwc.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    {{- include "eudiwc.oauth2ProxySelectorLabels" . | nindent 4 }}
{{- end }}

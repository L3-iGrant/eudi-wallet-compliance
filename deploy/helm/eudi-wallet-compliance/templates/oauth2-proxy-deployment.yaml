{{- if .Values.oauth2Proxy.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eudiwc.oauth2ProxyName" . }}
  labels:
    {{- include "eudiwc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.oauth2Proxy.replicaCount }}
  selector:
    matchLabels:
      {{- include "eudiwc.oauth2ProxySelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "eudiwc.oauth2ProxySelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 2000
        runAsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          args:
            - --provider=google
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --redirect-url=https://{{ .Values.ingress.host }}/oauth2/callback
            - --email-domain={{ .Values.oauth2Proxy.emailDomain }}
            - --whitelist-domain={{ .Values.ingress.host }}
            - --cookie-domain={{ .Values.ingress.host }}
            - --cookie-name={{ .Values.oauth2Proxy.cookie.name }}
            - --cookie-expire={{ .Values.oauth2Proxy.cookie.expire }}
            - --cookie-refresh={{ .Values.oauth2Proxy.cookie.refresh }}
            - --cookie-secure={{ .Values.oauth2Proxy.cookie.secure }}
            - --pass-access-token=false
            - --pass-authorization-header=false
            - --set-xauthrequest=true
            - --skip-provider-button=true
            - --upstream=static://200
            {{- if .Values.oauth2Proxy.googleGroups }}
            - --google-admin-email={{ .Values.oauth2Proxy.googleAdminEmail }}
            - --google-service-account-json=/secrets/google-service-account.json
            {{- range .Values.oauth2Proxy.googleGroups }}
            - --google-group={{ . }}
            {{- end }}
            {{- end }}
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.existingSecret }}
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.existingSecret }}
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.existingSecret }}
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            {{- toYaml .Values.oauth2Proxy.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- if .Values.oauth2Proxy.googleGroups }}
          volumeMounts:
            - name: google-sa
              mountPath: /secrets
              readOnly: true
          {{- end }}
      {{- if .Values.oauth2Proxy.googleGroups }}
      volumes:
        - name: google-sa
          secret:
            secretName: {{ .Values.oauth2Proxy.existingSecret }}
            items:
              - key: google-service-account.json
                path: google-service-account.json
      {{- end }}
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "eudiwc.fullname" . }}
  labels:
    {{- include "eudiwc.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "eudiwc.selectorLabels" . | nindent 4 }}

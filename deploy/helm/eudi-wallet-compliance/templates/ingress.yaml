{{- if .Values.ingress.enabled -}}
{{- $fullName := include "eudiwc.fullname" . -}}
{{- $oauthName := include "eudiwc.oauth2ProxyName" . -}}
# Protected Ingress: gates / behind the in-cluster auth subrequest. The
# annotations on this Ingress apply only to its own location blocks, so
# the sibling "auth" Ingress below is exempt from auth_request and the
# /oauth2/* round-trip avoids a redirect loop.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "eudiwc.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
    {{- if .Values.oauth2Proxy.enabled }}
    nginx.ingress.kubernetes.io/auth-url: "http://{{ $oauthName }}.{{ .Release.Namespace }}.svc.cluster.local/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://$host/oauth2/start?rd=https://$host$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User, X-Auth-Request-Email, X-Auth-Request-Preferred-Username"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}
                port:
                  name: http
{{- if .Values.oauth2Proxy.enabled }}
---
# Auth Ingress: same host, /oauth2/* paths only, deliberately without
# the auth-url annotations so the sign-in flow itself is not gated.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $oauthName }}
  labels:
    {{- include "eudiwc.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ $oauthName }}
                port:
                  name: http
{{- end }}
{{- end }}

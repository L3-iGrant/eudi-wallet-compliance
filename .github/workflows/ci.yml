name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Em dash check
        run: |
          if grep -rn --exclude-dir=node_modules --exclude-dir=.next "—" apps packages tools README.md 2>/dev/null; then
            echo "Em dash found, please remove"
            exit 1
          fi

      - run: pnpm -r lint

      - run: pnpm -r typecheck

      - run: pnpm -r test --if-present

      - run: pnpm --filter @iwc/web build

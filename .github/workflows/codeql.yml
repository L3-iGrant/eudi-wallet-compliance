name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyse (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        # Tolerates the SARIF upload failing while Code Scanning is not
        # yet enabled on the repository (private repo without GitHub
        # Advanced Security). Once Code Scanning is enabled in repo
        # settings, the upload succeeds and this flag becomes a no-op.
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

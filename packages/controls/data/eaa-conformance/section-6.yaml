  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA shall incorporate the document_number element
  spec_text: >-
    An ISO/IEC-mdoc EAA shall incorporate the document_number data element.

- id: EAA-6.2.3-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.3"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: document_number implements clause 4.2.3 semantics
  spec_text: >-
    The document_number data element shall implement the semantics of
    clause 4.2.3 of the present document.

- id: EAA-6.2.3-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.3"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: mDL document_number shall match Table 5 of ISO/IEC 18013-5
  spec_text: >-
    If the ISO/IEC-mdoc EAA is a mDL, then the document_number data element
    shall be as specified in Table 5 of clause 7.2.1 of ISO/IEC 18013-5.

- id: EAA-6.2.3-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.3"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL document_number shall match clause 6.3 of ISO/IEC 23220-2
  spec_text: >-
    If the ISO/IEC-mdoc EAA is NOT a mDL the document_number data element
    shall be as specified in clause 6.3 of ISO/IEC 23220-2.

# ─── §6.2.4 EAA issuer identifier ────────────────────────────────────────

- id: EAA-6.2.4.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: mDL shall include issuing_authority component
  spec_text: >-
    If an ISO/IEC-mdoc EAA is a mDL it shall include the issuing_authority
    component, specified in Table 5 of clause 7.2.1 of ISO/IEC 18013-5.

- id: EAA-6.2.4.1-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: issuing_authority implements clause 4.2.4 semantics
  spec_text: >-
    The issuing_authority data element shall implement the semantics of
    clause 4.2.4 of the present document.

- id: EAA-6.2.4.1-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL shall include the unicode issuing-authority element
  spec_text: >-
    If an ISO/IEC-mdoc EAA is NOT a mDL it shall include the unicode
    issuing authority element, specified in clause 6.3 of ISO/IEC 23220-2.
    Naming note: ISO/IEC 23220-2:2026 renames the element to
    "issuing_authority" (the latin1 variant becomes
    "issuing_authority_latin1"); ETSI TS 119 472-1 v1.2.1 still cites the
    older 23220-2 name "issuing_authority_unicode". The engine accepts
    either as satisfying this requirement.

- id: EAA-6.2.4.1-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: issuing_authority_unicode implements clause 4.2.4 semantics
  spec_text: >-
    The issuing_authority_unicode data element shall implement the semantics
    of clause 4.2.4 of the present document.

- id: EAA-6.2.4.1-05
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA may incorporate issuing_country
  spec_text: >-
    An ISO/IEC-mdoc EAA may incorporate the issuing_country, identifying the
    EU Member State where the ISO/IEC-mdoc EAA issuer is registered.

- id: EAA-6.2.4.1-06
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: mDL issuing_country shall match Table 5 of ISO/IEC 18013-5
  spec_text: >-
    If the ISO/IEC-mdoc EAA is a mDL, then the issuing_country data element
    shall be as specified in Table 5 of clause 7.2.1 of ISO/IEC 18013-5.

- id: EAA-6.2.4.1-07
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL issuing_country shall match clause 6.3 of ISO/IEC 23220-2
  spec_text: >-
    If the ISO/IEC-mdoc EAA is NOT a mDL the issuing_country data element
    shall be as specified in clause 6.3 of ISO/IEC 23220-2.

- id: EAA-6.2.4.1-08
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Optional issuing_country value shall match EAA-4.2.4.1-05
  spec_text: >-
    The value of the optional issuing_country data element shall be as
    specified in requirement EAA-4.2.4.1-05 of the present document.

- id: EAA-6.2.4.1-09
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA may include iss_reg_id where applicable
  spec_text: >-
    Where a registration identifier is applicable, an ISO/IEC-mdoc EAA may
    include the iss_reg_id data element.

- id: EAA-6.2.4.1-10
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 37
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: iss_reg_id data element shall be of tstr type
  spec_text: >-
    The iss_reg_id data element shall be an element of the type tstr
    (specified in IETF RFC 8610).

- id: EAA-6.2.4.1-11
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 38
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: iss_reg_id value shall be a registration identifier
  spec_text: >-
    The value of the iss_reg_id data element shall be a registration
    identifier.

- id: EAA-6.2.4.1-12
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 38
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: iss_reg_id value may follow ETSI EN 319 412-1 LEG-5.1.4 rules
  spec_text: >-
    The value of the iss_reg_id data element may be built applying the rules
    specified in requirements LEG-5.1.4-02 to LEG-5.1.4-08 (both included)
    in clause 5.1.4 of ETSI EN 319 412-1.

- id: EAA-6.2.4.1-13
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.1"
    page: 38
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: iss_reg_id mutex with embedded qualified certificate
  spec_text: >-
    An ISO/IEC-mdoc EAA shall not incorporate the iss_reg_id claim if it
    incorporates the qualified certificate supporting the ISO/IEC-mdoc EAA
    signature.

- id: QEAA-6.2.4.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.2"
    page: 38
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Legal-person QEAA shall carry registration identifier
  spec_text: >-
    If the issuer of the ISO/IEC-mdoc QEAA is a legal person and if a
    registration identifier is applicable, an ISO/IEC-mdoc QEAA shall include
    the registration identifier either in the iss_reg_id data element or
    within the qualified certificate supporting its signature.

- id: QEAA-6.2.4.2-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.2"
    page: 38
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: QEAA iss_reg_id shall match organizationIdentifier rules
  spec_text: >-
    The value of the iss_reg_id data element shall be built according to the
    rules defined in clause 5.1.4 of ETSI EN 319 412-1 to build the value of
    the organizationIdentifier attribute in the subject field of an X.509
    certificate.

- id: PuB-EAA-6.2.4.3-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.3"
    page: 38
  requirement_level: shall
  applies_to: [pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: PuB-EAA shall carry registration identifier where applicable
  spec_text: >-
    Where a registration identifier is applicable, an ISO/IEC 18013-5 PuB-EAA
    shall include the registration identifier either in the iss_reg_id data
    element or within the qualified certificate supporting its signature.

- id: PuB-EAA-6.2.4.3-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.4.3"
    page: 38
  requirement_level: shall
  applies_to: [pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: PuB-EAA iss_reg_id shall match organizationIdentifier rules
  spec_text: >-
    The value of the iss_reg_id data element shall be built according to the
    rules defined in clause 5.1.4 of ETSI EN 319 412-1 to build the value of
    the organizationIdentifier attribute in the subject field of an X.509
    certificate.

# ─── §6.2.5 EAA subject and attribute subject identifiers and pseudonyms ─

- id: EAA-6.2.5.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.1"
    page: 38
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: mDL identifying its subject shall include the standard triplet
  spec_text: >-
    If an ISO/IEC-mdoc EAA requires that the EAA subject (the holder of the
    mDL) is identified, the ISO/IEC-mdoc EAA shall include the following data
    elements, specified in Table 5 of clause 7.2.1 of ISO/IEC 18013-5:
    given_name and family_name, and document_number.

- id: EAA-6.2.5.1-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.1"
    page: 38
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: mDL shall include either the standard triplet or also_known_as
  spec_text: >-
    An ISO/IEC-mdoc EAA that is a mDL shall include either the complete set
    of data elements mentioned in the previous requirement identifying the
    EAA subject, or the also_known_as data element.

- id: EAA-6.2.5.1-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.1"
    page: 38
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: also_known_as data element shall be of tstr type
  spec_text: >-
    The also_known_as data element shall be an element of the type tstr
    (specified in IETF RFC 8610).

- id: EAA-6.2.5.1-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.1"
    page: 38
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL identifying its subject shall include the standard triplet
  spec_text: >-
    If the ISO/IEC-mdoc EAA is NOT a mDL, and requires that the EAA subject
    (the holder of the mDoc) is identified, the ISO/IEC-mdoc EAA shall
    include the following data elements, specified in clause 6.3 of
    ISO/IEC 23220-2: given_name, family_name, and document_number.

- id: EAA-6.2.5.1-05
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.1"
    page: 38
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL shall include either the standard triplet or also_known_as
  spec_text: >-
    An ISO/IEC-mdoc EAA that is NOT a mDL shall include either the complete
    set of data elements mentioned in the previous requirement identifying
    the EAA subject, or the also_known_as data element.

- id: EAA-6.2.5.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.2"
    page: 39
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA may carry also_known_as as subject pseudonym
  spec_text: >-
    An ISO/IEC-mdoc EAA may contain the also_known_as data element, which
    shall contain the pseudonym of the EAA, and therefore shall implement
    the semantics specified in clause 4.2.6.3 of the present document.

- id: EAA-6.2.5.3-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.3"
    page: 39
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA may include attribute subjects
  spec_text: >-
    An ISO/IEC-mdoc EAA may include attributes that refer to entities that
    are not the EAA subject: the attribute subjects.

- id: EAA-6.2.5.3-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.3"
    page: 39
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Attribute subjects may be identified or pseudonymised
  spec_text: >-
    For each attribute subject, an ISO/IEC-mdoc EAA may include the attribute
    subject identifier or the attribute subject pseudonym.

- id: EAA-6.2.5.3-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.3"
    page: 39
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Attribute subject identifiers shall associate to their attributes
  spec_text: >-
    In an ISO/IEC-mdoc EAA the identifiers of the attribute subjects shall
    be associated to their corresponding attributes as specified in
    clause 6.3 of the present document.

- id: EAA-6.2.5.4-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.4"
    page: 39
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA may include attribute subject pseudonyms
  spec_text: >-
    An ISO/IEC-mdoc EAA may include pseudonyms of attribute subjects.

- id: EAA-6.2.5.4-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.4"
    page: 39
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Attribute subject pseudonyms shall associate to their attributes
  spec_text: >-
    In an ISO/IEC-mdoc EAA, the pseudonyms of the attribute subjects shall
    be associated with their corresponding attributes as specified in
    clause 6.3 of the present document.

- id: QEAA-6.2.5.5-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.5"
    page: 39
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc QEAA attributes shall refer to the EAA subject
  spec_text: >-
    In an ISO/IEC-mdoc QEAA all the attributes shall refer to the EAA subject.

- id: PuB-EAA-6.2.5.6-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.5.6"
    page: 39
  requirement_level: shall
  applies_to: [pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc PuB-EAA attributes shall refer to the EAA subject
  spec_text: >-
    In an ISO/IEC-mdoc PuB-EAA all the attributes shall refer to the EAA
    subject.

# ─── §6.2.6 EAA issuance ─────────────────────────────────────────────────

- id: EAA-6.2.6-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.6"
    page: 39
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA shall incorporate issue_date
  spec_text: >-
    An ISO/IEC-mdoc EAA shall incorporate the issue_date data element.

- id: EAA-6.2.6-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.6"
    page: 39
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: issue_date implements clause 4.2.7 semantics
  spec_text: >-
    The issue_date data element shall indicate the issuance date according
    to the semantics of clause 4.2.7 of the present document.

- id: EAA-6.2.6-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.6"

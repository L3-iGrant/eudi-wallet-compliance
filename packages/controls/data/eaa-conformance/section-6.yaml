# ─── §6.2.10 EAA status service ──────────────────────────────────────────

- id: EAA-6.2.10.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.1"

    clause: "6.2.8.2"
    page: 40
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA may incorporate the oneTime data element
  spec_text: >-
    An ISO/IEC-mdoc EAA may incorporate the oneTime data element.

- id: EAA-6.2.8.2-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.8.2"
    page: 40
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: oneTime implements clause 4.2.9.3 semantics
  spec_text: >-
    The oneTime data element shall implement the semantics specified in
    clause 4.2.9.3 of the present document.

- id: EAA-6.2.8.2-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.8.2"
    page: 40
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: oneTime data element shall have CBOR bool type
  spec_text: >-
    The oneTime data element shall have the bool CBOR type.

- id: EAA-6.2.8.2-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.8.2"
    page: 40
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: oneTime true means single-use, no retention
  spec_text: >-
    If the oneTime data element is present and set to true, it shall
    indicate that the EAA shall be used only once, and that it shall not be
    retained for future use.

- id: EAA-6.2.8.2-05
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.8.2"
    page: 40
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: oneTime false or absent removes the constraint
  spec_text: >-
    If the oneTime data element is present and set to false or it is absent,
    the aforementioned constraint shall not apply to the EAA.


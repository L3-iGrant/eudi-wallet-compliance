  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: MSO may carry status member
  spec_text: >-
    An ISO/IEC-mdoc may contain the status member within the instance of
    MobileSecurityObject.
  related_controls: [EAA-6.2.10.1-02, EAA-6.2.10.1-03, EAA-4.2.11.1-03]

- id: EAA-6.2.10.1-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.1"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: status member implements clause 4.2.11 semantics
  spec_text: >-
    The status member shall implement the semantics specified in clause
    4.2.11 of the present document.

- id: EAA-6.2.10.1-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.1"
    page: 41
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, status-list]
  short_title: status may contain status_list per IETF Token Status List
  spec_text: >-
    The status member may contain the status_list member as specified in
    clause 6.3 of IETF draft-ietf-oauth-status-list-13.

- id: EAA-6.2.10.1-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.1"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: When status is present, the type member shall be present
  spec_text: >-
    When the status member is present in the MobileSecurityObject, the status
    object shall have a type member, mirroring §5.2.10.1-04 for SD-JWT VC.

- id: EAA-6.2.10.1-06
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.1"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: When status is present, the purpose member shall be present
  spec_text: >-
    When the status member is present in the MobileSecurityObject, the status
    object shall have a purpose member, mirroring §5.2.10.1-06 for SD-JWT VC.

- id: EAA-6.2.10.1-08
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.1"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: When status is present, the index member shall be present
  spec_text: >-
    When the status member is present in the MobileSecurityObject, the status
    object shall have an index member, mirroring §5.2.10.1-08 for SD-JWT VC.

- id: EAA-6.2.10.1-10
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.1"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: When status is present, the uri member shall be present
  spec_text: >-
    When the status member is present in the MobileSecurityObject, the status
    object shall have a uri member, mirroring §5.2.10.1-10 for SD-JWT VC.

- id: EAA-6.2.10.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.1"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, status-list]
  short_title: Runtime status resolver for mdoc EAA
  spec_text: >-
    Runtime check (synthetic): the URI in the credential's status component
    must resolve to a parseable Token Status List, and the credential's index
    must read out a registered status value. Mirrors §5.2.10.2-01 for SD-JWT
    VC; the IETF nested envelope (status_list.idx / status_list.uri) is
    accepted in lieu of the ETSI flat shape via the shared normaliseStatus
    helper.

- id: QEAA-6.2.10.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.2"
    page: 41
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, status-list]
  short_title: QEAA without shortLived shall carry status in MSO
  spec_text: >-
    If an ISO/IEC-mdoc QEAA does not contain the shortLived data element, it
    shall contain the status member within the instance of
    MobileSecurityObject as specified in clause 6.2.10.1.

- id: PuB-EAA-6.2.10.3-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.10.3"
    page: 41
  requirement_level: shall
  applies_to: [pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, status-list]
  short_title: PuB-EAA without shortLived shall carry status in MSO
  spec_text: >-
    If an ISO/IEC-mdoc PuB-EAA does not contain the shortLived data element,
    it shall contain the status member within the instance of
    MobileSecurityObject as specified in clause 6.2.10.1.

# ─── §6.2.11 EAA renewal service ─────────────────────────────────────────

- id: EAA-6.2.11-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.11"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA shall not carry a renewal-service component
  spec_text: >-
    An ISO/IEC-mdoc EAA shall not incorporate any component implementing the
    semantics specified in clause 4.2.12 of the present document.

# ─── §6.2.12 EAA short-lived ─────────────────────────────────────────────

- id: EAA-6.2.12-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.12"
    page: 41
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA may incorporate the shortLived data element
  spec_text: >-
    An ISO/IEC-mdoc EAA may incorporate the shortLived data element.

- id: EAA-6.2.12-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.12"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: shortLived implements clause 4.2.13 semantics
  spec_text: >-
    The shortLived data element shall implement the semantics specified in
    clause 4.2.13 of the present document.

- id: EAA-6.2.12-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.12"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: shortLived data element shall have CBOR bool type
  spec_text: >-
    The shortLived data element shall have the bool CBOR type.

- id: EAA-6.2.12-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.12"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: shortLived true bypasses revocation status check
  spec_text: >-
    If the shortLived data element is present and set to true, it shall
    indicate that the validity period of the EAA is so short that it shall
    not be necessary to check its revocation status.

- id: EAA-6.2.12-05
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.12"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: shortLived false or absent requires revocation status check
  spec_text: >-
    If the shortLived data element is present and set to false or it is
    absent, the aforementioned constraint shall not apply to the EAA and it
    shall be necessary to check its revocation status.

# ─── §6.3 Attested attributes ────────────────────────────────────────────

- id: EAA-6.3-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.3"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Attested attributes shall be carried in IssuerSignedItem components
  spec_text: >-
    An ISO/IEC-mdoc EAA shall include each attested attribute, regardless it
    is disclosable or not, in one or more IssuerSignedItem component, and
    shall be incorporated to the ISO/IEC-mdoc EAA as specified in clause
    8.3.2.1.2.2 of ISO/IEC 18013-5.

- id: EAA-6.3-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.3"
    page: 41
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-EAA-subject attributes shall use SubAttr in elementValue
  spec_text: >-
    For associating one attribute to one entity different than the EAA
    subject, the ISO/IEC-mdoc EAA shall include an instance of the SubAttr
    type (which is defined below) in the elementValue member of
    IssuerSignedItem.

- id: EAA-6.3-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.3"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: SubAttr shall have either subId or subAka member
  spec_text: >-
    An instance of SubAttr type shall have either the subId member or the
    subAka member.

- id: EAA-6.3-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.3"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: subId shall be a CBOR map identifying the attribute subject
  spec_text: >-
    The subId member shall be a CBOR map whose members shall univocally
    identify the attribute subject.

- id: EAA-6.3-05
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.3"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: subAka shall be a CBOR String pseudonym
  spec_text: >-
    The subAka member shall be a CBOR String whose value shall be the
    pseudonym of an attribute subject which shall associate the attributes
    to this attribute subject.

# ─── §6.4 Attested Attributes metadata ───────────────────────────────────

- id: EAA-6.4.1.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.4.1.2"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA shall include version in MobileSecurityObject
  spec_text: >-
    An ISO/IEC-mdoc EAA shall include the version component within its
    MobileSecurityObject.

- id: EAA-6.4.1.3-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.4.1.3"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Disclosable attributes shall ride in IssuerSignedItem components
  spec_text: >-
    An ISO/IEC-mdoc EAA containing disclosable attributes, shall include
    each disclosure in one IssuerSignedItem component, and shall be
    incorporated to the ISO/IEC-mdoc EAA as specified in clause 8.3.2.1.2.2
    of ISO/IEC 18013-5.

- id: EAA-6.4.1.4-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.4.1.4"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: valueDigests implements clause 4.4.2.3 semantics
  spec_text: >-
    For an ISO/IEC-mdoc EAA, the valueDigests component shall implement the
    semantics specified in clause 4.4.2.3 of the present document.

- id: EAA-6.4.1.4-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.4.1.4"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Disclosable mdoc shall include valueDigests in MSO
  spec_text: >-
    If an ISO/IEC-mdoc includes selectively disclosable attested attributes,
    it shall include the valueDigests component within its
    MobileSecurityObject, as specified in clause 9.1.2.4 of ISO/IEC 18013-5
    for supporting the semantics specified in clause 4.4.2.3 of the present
    document.

- id: EAA-6.4.1.5-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.4.1.5"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Disclosable mdoc shall include digestAlgorithm in MSO
  spec_text: >-
    An ISO/IEC-mdoc EAA containing disclosable attributes, shall include the
    digestAlgorithm component within its MobileSecurityObject.

# ─── §6.5 EAA data for Key Binding ───────────────────────────────────────

- id: EAA-6.5-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.5"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: deviceKey shall sit within deviceKeyInfo of MSO
  spec_text: >-
    An ISO/IEC-mdoc EAA shall incorporate the deviceKey member within the
    deviceKeyInfo member of the instance of MobileSecurityObject type, to
    implement the semantics specified in clause 4.5 of the present document.

- id: EAA-6.5-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.5"
    page: 42
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: deviceKey shall be the EAA subject's public key
  spec_text: >-
    The deviceKey member within the deviceKeyInfo member of the instance of
    MobileSecurityObject type, shall contain a public key whose private key
    is in possession of the EAA subject.

# ─── §6.6 EAA digital signature ──────────────────────────────────────────

- id: EAA-6.6.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.6.1"
    page: 43
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, issuer-cert]
  short_title: ISO/IEC-mdoc EAA shall be signed by a CB-AdES digital signature
  spec_text: >-
    An ISO/IEC-mdoc EAA shall be signed by a CB-AdES digital signature.

- id: QEAA-6.6.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.6.2"
    page: 43
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, issuer-cert]
  short_title: QEAA CB-AdES shall be a qualified electronic signature or seal
  spec_text: >-
    The CB-AdES digital signature signing an ISO/IEC-mdoc QEAA shall be a
    qualified electronic signature or a qualified electronic seal.

- id: QEAA-6.6.2-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.6.2"
    page: 43
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, issuer-cert]
  short_title: QEAA Protected Header shall contain x5u and x5t
  spec_text: >-
    The Protected Header of the CB-AdES digital signature signing an
    ISO/IEC-mdoc QEAA shall contain the x5u and the x5t header parameters,
    both specified in IETF RFC 9360.

- id: QEAA-6.6.2-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.6.2"
    page: 43
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, issuer-cert]
  short_title: QEAA x5t digest algorithm shall be SHA-256
  spec_text: >-
    The digest algorithm used in the x5t header parameter, shall be SHA-256.

- id: QEAA-6.6.2-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.6.2"
    page: 43
  requirement_level: should
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload, issuer-cert]
  short_title: QEAA Protected Header should contain x5chain
  spec_text: >-
    The Protected Header of the CB-AdES digital signature signing an
    ISO/IEC-mdoc QEAA should contain the x5chain header parameter, specified
    in IETF RFC 9360.


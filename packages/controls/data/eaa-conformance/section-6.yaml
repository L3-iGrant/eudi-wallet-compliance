  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc EAA shall not carry an audience component
  spec_text: >-
    An ISO/IEC-mdoc EAA shall not incorporate any data element implementing
    the semantics specified in clause 4.2.9.2 of the present document.

- id: EAA-6.2.8.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1

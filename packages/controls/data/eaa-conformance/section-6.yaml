# Section 6 controls: ISO/IEC mdoc EAA realisation per ETSI TS 119 472-1
# v1.2.1 §6. Each entry is profile-tagged [mdoc]; cross-cutting clause-4
# rules carry profile: [abstract] in section-4.yaml and apply across both
# profiles automatically through the scope filter.
#
# plain_english and why_it_matters are deferred to a hand-curation pass;
# Zod fills plain_english with the literal "TODO" placeholder when absent.

# ─── §6.1 General requirements ───────────────────────────────────────────

- id: EAA-6.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.1"
    page: 35
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Data structures shall be those of ISO/IEC 18013-5
  spec_text: >-
    The data structures of the EAA shall be the data structures defined in
    ISO/IEC 18013-5, extended with some structures defined in the present
    document for meeting specific EAA requirements.

- id: EAA-6.1-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.1"
    page: 35
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: mDL shall carry org.iso.18013.5.1 namespace data elements
  spec_text: >-
    If the EAA is a mobile driving license (mDL) (i.e. the document type of the
    EAA is "org.iso.18013.5.1.mDL"), it shall contain data elements defined in
    section 7.1 of ISO/IEC 18013-5 within the namespace "org.iso.18013.5.1";
    and may contain data elements defined in the present document.

- id: EAA-6.1-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.1"
    page: 35
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL shall carry org.iso.23220.1 namespace data elements
  spec_text: >-
    If the EAA is NOT a mobile driving license, it shall contain data elements
    defined in section 6.3 of ISO/IEC 23220-2 within the namespace
    "org.iso.23220.1"; may contain data elements defined in the present
    document; and may contain data elements defined in another document.

- id: EAA-6.1-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.1"
    page: 35
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: New data elements shall sit in org.etsi.01947201.010101 namespace
  spec_text: >-
    The data elements defined in the present document shall be assigned the
    namespace "org.etsi.01947201.010101".

- id: EAA-6.1-05
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.1"
    page: 35
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: mDL presence column of Table 5 of ISO/IEC 18013-5 applies
  spec_text: >-
    If the ISO/IEC-mdoc EAA is a mDL, the "presence" column of the Table 5
    of ISO/IEC 18013-5 shall apply.

- id: EAA-6.1-06
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.1"
    page: 35
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL type document shall specify mandatory data elements
  spec_text: >-
    If the ISO/IEC-mdoc EAA is NOT a mDL, the document defining the
    ISO/IEC-mdoc EAA type shall specify which data elements are mandatory.

- id: EAA-6.1-07
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.1"
    page: 35
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: EAA shall be an instance of IssuerSigned per ISO/IEC 18013-5
  spec_text: >-
    ISO/IEC-mdoc EAA shall be an instance of IssuerSigned type defined in
    ISO/IEC-mdoc, clause 8.3.2.1.2.2, extended as specified in the present
    document.

- id: EAA-6.1-08
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.1"
    page: 36
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: New tstr elements shall encode in Unicode unless stated otherwise
  spec_text: >-
    The encoding of any new data element of tstr type defined in clause 6
    shall be Unicode unless stated otherwise.

# ─── §6.2.2 EAA category ─────────────────────────────────────────────────

- id: EAA-6.2.2.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.2.1"
    page: 36
  requirement_level: shall
  applies_to: [ordinary-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-qualified, non-public-body EU mdoc shall not include category
  spec_text: >-
    ISO/IEC-mdoc EAAs issued by EAAs issuers registered in the European Union,
    which are neither ISO/IEC-mdoc QEAAs nor ISO/IEC-mdoc PuB-EAAs, shall not
    include the category data element.

- id: EAA-6.2.2.1-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.2.1"
    page: 36
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: category data element implements clause 4.2.2 semantics
  spec_text: >-
    The category data element shall implement the semantics specified in
    clause 4.2.2 of the present document.

- id: EAA-6.2.2.1-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.2.1"
    page: 36
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: category data element shall be of tstr type
  spec_text: >-
    The category data element shall be of type tstr (specified in IETF
    RFC 8610).

- id: QEAA-6.2.2.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.2.2"
    page: 36
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc QEAA shall include category data element
  spec_text: >-
    An ISO/IEC-mdoc QEAA shall include the category data element, which shall
    implement the semantics specified in clause 4.2.2 of the present document.

- id: QEAA-6.2.2.2-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.2.2"
    page: 36
  requirement_level: shall
  applies_to: [qeaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: QEAA category value shall be the qualified URN
  spec_text: >-
    The value of the category data element in an ISO/IEC-mdoc QEAA shall be
    the URN defined in requirement QEAA-4.2.2.2-02 (urn:etsi:esi:eaa:eu:qualified).

- id: PuB-EAA-6.2.2.3-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.2.3"
    page: 36
  requirement_level: shall
  applies_to: [pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: ISO/IEC-mdoc PuB-EAA shall include category data element
  spec_text: >-
    An ISO/IEC-mdoc PuB-EAA shall include the category data element, which
    shall implement the semantics specified in clause 4.2.2 of the present
    document.

- id: PuB-EAA-6.2.2.3-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.2.3"
    page: 37
  requirement_level: shall
  applies_to: [pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: PuB-EAA category value shall be the public-body URN
  spec_text: >-
    The value of the category data element in an ISO/IEC-mdoc PuB-EAA shall be
    the URN defined in requirement PuB-EAA-4.2.2.3-02 (urn:etsi:esi:eaa:eu:pub).

# ─── §6.2.3 EAA identifier ───────────────────────────────────────────────


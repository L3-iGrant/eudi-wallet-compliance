  short_title: mDL issue_date shall match Table 5 of ISO/IEC 18013-5
  spec_text: >-
    If the ISO/IEC-mdoc EAA is a mDL, then the issue_date data element shall
    be as specified in Table 5 of clause 7.2.1 of ISO/IEC 18013-5.

- id: EAA-6.2.6-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.6"
    page: 39
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL issue_date shall match clause 6.3 of ISO/IEC 23220-2
  spec_text: >-
    If the ISO/IEC-mdoc EAA is NOT a mDL the issue_date data element shall
    be as specified in clause 6.3 of ISO/IEC 23220-2.

# ─── §6.2.7 EAA validity periods ─────────────────────────────────────────

- id: EAA-6.2.7.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.7.1"
    page: 39
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: validityInfo.validFrom marks technical validity start
  spec_text: >-
    The validFrom member of the validityInfo member of the instance of
    MobileSecurityObject type specified in clause 9.1.2.4 of ISO/IEC 18013-5,
    shall implement the semantics of the start time of the ISO/IEC-mdoc EAA
    technical validity period.

- id: EAA-6.2.7.1-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.7.1"
    page: 39
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: validityInfo.validUntil marks technical validity end
  spec_text: >-
    The validUntil member of the validityInfo member of the instance of
    MobileSecurityObject type specified in clause 9.1.2.4 of ISO/IEC 18013-5,
    shall implement the semantics of the end type instant of the
    ISO/IEC-mdoc EAA technical validity period.

- id: EAA-6.2.7.1-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.7.1"
    page: 39
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: validFrom and validUntil shall indicate UTC time
  spec_text: >-
    The validFrom and the validUntil members shall indicate the UTC time for
    date and time.

- id: EAA-6.2.7.1-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.7.1"
    page: 40
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: validFrom and validUntil shall have seconds precision
  spec_text: >-
    The validFrom and the validUntil members shall have seconds precision.

- id: EAA-6.2.7.1-05
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.7.1"
    page: 40
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: validFrom and validUntil shall not contain fractions of seconds
  spec_text: >-
    The validFrom and the validUntil members shall not contain fractions of
    seconds.

- id: EAA-6.2.7.2-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.7.2"
    page: 40
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: mDL expiry_date marks administrative validity end
  spec_text: >-
    If the ISO/IEC-mdoc EAA is a mDL, then the expiry_date element specified
    in table 5 of clause 7.1 of ISO/IEC 18013-5, shall implement the
    semantics of the end date of the ISO/IEC-mdoc EAA administrative
    validity period.

- id: EAA-6.2.7.2-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.7.2"
    page: 40
  requirement_level: shall
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: Non-mDL expiry_date marks administrative validity end
  spec_text: >-
    If the ISO/IEC-mdoc EAA is NOT a mDL, then the expiry_date element
    specified in clause 6.3 of ISO/IEC 23220-2, shall implement the
    semantics of the end date of the ISO/IEC-mdoc EAA administrative
    validity period.

- id: EAA-6.2.7.2-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: "6.2.7.2"
    page: 40
  requirement_level: may
  applies_to: [ordinary-eaa, qeaa, pub-eaa]
  profile: [mdoc]
  role: [issuer, verifier]
  evidence_type: [eaa-payload]
  short_title: issue_date may mark administrative validity start
  spec_text: >-
    The issue_date data element, as specified in clause 6.2.6 of the present
    document, may be considered, wherever appropriate, to implement the
    semantics of the start date of the ISO/IEC-mdoc EAA Administrative
    validity period.

# ─── §6.2.8 Components constraining usage ────────────────────────────────

- id: EAA-6.2.8.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1

  short_title: An EAA may include the EAA subject identifier, or the pseudonym of the EAA
  spec_text: 'An EAA may include the EAA subject identifier, or the pseudonym of
    the EAA subject, or none of them. NOTE 1: The former requirement implies
    that there can be EAAs that do not include any identifier or pseudonym of
    the EAA subject. NOTE 2: This presence of the EAA subject can be provided by
    a component specifically defined for containing ONLY the EAA subject
    identifier, or by a component defined for containing the attribute subject
    identifier. EXAMPLE: Implementations based on "Verifiable Credentials Data
    Model v2.0" [1], only define a component for identifiers bound to sets of
    attributes . Each id field within each element of the credentialSubject
    array contains the identifier of the attribute subject referred by the
    attributes that are present within this array element. If the
    credentialSubject array has only one element, the value of this id field is
    the value of the EAA subject identifier. If the credentialSubject array has
    several elements, each id field contains one attribute subject identifier
    and the value of the EAA subject identifier is the value of one of these id
    fields. In any case, the EAA subject identifier is present within the EAA
    even if there is not a specific component allocated for containing only the
    EAA identifier value.'

    that support the disclosure of attested attributes. 4.4.2 Support to
    selective disclosure of attested attributes 4.4.2.1 Introduction Clause
    4.4.2 specifies the semantics of: • The identifier of the selective
    disclosure schema used in the EAA. This identifier may appear explicitly
    within the EAA or be implicit (clause 4.4.2.2 of the present document). •
    The disclosure, which is a structure that contains, among other data, the
    attested attribute to be selectively disclosed (clause 4.4.2.3 of the
    present document). • The disclosure reference, which is a data bound to on e
    disclosure, built in a way that this binding can be ascertained using a
    certain algorithm, and from which it is not computationally feasible to get
    the value of the attested attribute (clause 4.4.2.4 of the present
    document). • The identifier and any required parameter(s) of the algorithm
    for computing the disclosure reference, based on the bound disclosure, and
    ensure their binding (clause 4.4.2.5 of the present document). ETSI ETSI TS
    119 472 - 1 V1.2.1 (2026 - 02) 25 4.4.2.2 Disclosure schema identifier"

- id: PuB-EAA-5.2.4.3-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: 5.2.4.3
    page: 30
  modal_verb: shall
  applies_to:
    - pub-eaa
  profile:
    - sd-jwt-vc
  role:
    - issuer
    - verifier
  evidence_type:
    - eaa-payload
    - issuer-cert
  short_title: PuB-EAA must declare the issuer's country of establishment
  spec_text: >-
    A SD-JWT VC PuB-EAA shall include the identifier of the country where its
    Issuer is established either within the issuing_country claim or within the
    qualified certificate supporting its signature.
  plain_english: TODO
  common_mistakes: []
  related_controls: []

- id: PuB-EAA-5.2.4.3-03
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: 5.2.4.3
    page: 30
  modal_verb: shall
  applies_to:
    - pub-eaa
  profile:
    - sd-jwt-vc
  role:
    - issuer
    - verifier
  evidence_type:
    - eaa-payload
    - issuer-cert
  short_title: Legal-person PuB-EAA includes a registration identifier
  spec_text: >-
    If the issuer of the SD-JWT VC PuB-EAA is a legal person and if a
    registration identifier is applicable, then the SD-JWT VC PuB-EAA shall
    include the registration identifier either in the iss_reg_id claim or
    within the qualified certificate supporting its signature.
  plain_english: TODO
  common_mistakes: []
  related_controls:
    - PuB-EAA-5.2.4.3-04

- id: PuB-EAA-5.2.4.3-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: 5.2.4.3
    page: 30
  modal_verb: shall
  applies_to:
    - pub-eaa
  profile:
    - sd-jwt-vc
  role:
    - issuer
    - verifier
  evidence_type:
    - eaa-payload
  short_title: iss_reg_id follows ETSI organisation-identifier rules
  spec_text: >-
    The value of the iss_reg_id claim shall be built according to the rules
    defined in clause 5.1.4 of ETSI EN 319 412-1 to build the value of the
    organizationIdentifier attribute in the subject field of an X.509
    certificate.
  plain_english: TODO
  common_mistakes: []
  related_controls:
    - PuB-EAA-5.2.4.3-03


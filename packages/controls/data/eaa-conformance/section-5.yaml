- id: EAA-5.2.10.1-04
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: 5.2.10.1
    page: 32
  modal_verb: shall
  applies_to:
    - ordinary-eaa
    - qeaa
    - pub-eaa
  profile:
    - sd-jwt-vc
  role:
    - issuer
    - verifier
  evidence_type:
    - eaa-payload
    - status-list
  short_title: Status JSON Object must include the type member
  spec_text: The status JSON Object shall have the type member.
  plain_english: >-
    If the EAA carries a status component, the status JSON object must
    include a type member naming the status mechanism in use, e.g.
    TokenStatusList. The type tells the verifier which dereferencing and
    decoding routine to apply when fetching status.
  why_it_matters: >-
    The status component is polymorphic: there is more than one way to
    express revocation (Token Status List today, future mechanisms later).
    Without type, a verifier cannot tell which it is looking at, and may
    either fail open (skip the check) or fail closed (reject every
    credential).
  common_mistakes:
    - Including a status object without a type field.
    - Putting the status mechanism name in a non-standard place such as inside purpose.
    - Using a type value outside the registered set.
  related_controls:
    - EAA-5.2.10.1-03
    - EAA-5.2.10.1-05
    - EAA-5.2.10.1-06
    - EAA-5.2.10.1-08
    - EAA-5.2.10.1-10
    - EAA-4.2.11.1-04


  short_title: Selectively-disclosable array elements replaced by disclosure digests
  spec_text: >-
    A SD-JWT VC EAA requiring that one or more individual elements of JSON
    arrays are selectively disclosable (clause 4.2.2 of IETF SD-JWT), shall
    incorporate in the payload the mentioned JSON arrays where the individual
    elements that are selectively disclosable have been replaced by their
    corresponding disclosure digests computed as specified in clause 5.2.4.2 of
    IETF SD-JWT.

  short_title: Selectively-disclosable JSON properties require the _sd component
  spec_text: >-
    A SD-JWT VC EAA containing one or more selectively disclosable attested
    attributes that are JSON Properties (clause 4.2.1 of IETF SD-JWT), shall
    include the _sd component containing their disclosure digests computed as
    specified in clause 5.2.4.1 of IETF SD-JWT.

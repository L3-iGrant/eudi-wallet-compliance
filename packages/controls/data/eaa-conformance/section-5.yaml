- id: QEAA-5.6.2-02
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: 5.6.2
    page: 34
  modal_verb: shall
  applies_to:
    - qeaa
  profile:
    - sd-jwt-vc
  role:
    - issuer
    - verifier
  evidence_type:
    - eaa-header
    - issuer-cert
  short_title: QEAA protected header must include x5u and x5t#S256
  spec_text: >-
    The Protected Header of the digital signature signing a SD-JWT VC QEAA
    shall contain the x5u and the x5t#S256 header parameters, specified in IETF
    RFC 7515. (Note: this requirement meets requirement (h) in Annex V of
    Regulation (EU) 2024/1183 for QEAA, which requires the location where the
    certificate supporting the qualified electronic signature or qualified
    electronic seal is available free of charge. The x5t#S256 header parameter
    is required for security reasons.)
  plain_english: TODO
  common_mistakes: []
  related_controls:
    - QEAA-5.6.2-01
    - QEAA-5.6.2-03


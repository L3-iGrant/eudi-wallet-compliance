- id: EAA-5.2.7.1-01
  module: eaa-conformance
  spec_source:
    document: ETSI TS 119 472-1
    version: v1.2.1
    clause: 5.2.7.1
    page: 31
  modal_verb: shall
  applies_to:
    - ordinary-eaa
    - qeaa
    - pub-eaa
  profile:
    - sd-jwt-vc
  role:
    - issuer
    - verifier
  evidence_type:
    - eaa-payload
  short_title: EAA includes the nbf claim for technical-validity start
  spec_text: >-
    A SD-JWT VC EAA shall include the nbf claim specified in IETF RFC 7519
    clause 4.1.5, and further profiled in IETF SD-JWT VC clause 3.2.2.2.
  plain_english: >-
    Every SD-JWT VC EAA must carry the nbf ("not before") claim. This is the
    earliest moment in time at which the EAA is technically valid; before
    this instant a verifier must reject it.
  why_it_matters: >-
    Without an explicit start of validity, an EAA could be replayed before it
    is supposed to be active or treated as valid forever. nbf is one half of
    the bounded-validity window every EAA needs.
  common_mistakes:
    - Treating nbf as optional (it is mandatory for clause 5 EAAs).
    - Setting nbf to a sentinel like 0 to skip the check.
    - Confusing nbf (start of technical validity) with iat (time of issuance).
  related_controls:
    - EAA-5.2.7.1-02
    - EAA-5.2.7.1-03
    - EAA-5.2.7.1-04
    - EAA-5.2.6-01


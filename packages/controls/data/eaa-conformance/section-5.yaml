  short_title: PuB-EAA protected header must include x5u and x5t#S256
  spec_text: >-
    The Protected Header of the digital signature signing a SD-JWT VC PuB-EAA
    shall contain the x5u and the x5t#S256 header parameters, specified in IETF
    RFC 7515. (Note: this requirement meets requirement (h) in Annex VII of
    Regulation (EU) 2024/1183 for PuB-EAA, which requires the location where
    the certificate supporting the qualified electronic signature or qualified
    electronic seal is available free of charge. The x5t#S256 header parameter
    is required for security reasons.)
